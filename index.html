<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia para Mimi </title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}
canvas{
    display:block;
}
</style>
</head>

<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// ===== ESCENA =====
const scene = new THREE.Scene();

// ===== CAMARA =====
const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);
camera.position.z = 25;

// ===== RENDER =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== GALAXIA =====
const geometry = new THREE.BufferGeometry();
const vertices = [];

const branches = 5;
const radius = 20;
const spin = 1.5;

for(let i=0;i<9000;i++){

    const r = Math.random()*radius;
    const branchAngle = (i % branches)/branches * Math.PI*2;
    const spinAngle = r * spin;

    const x = Math.cos(branchAngle + spinAngle)*r;
    const y = (Math.random()-0.5)*2;
    const z = Math.sin(branchAngle + spinAngle)*r;

    vertices.push(x,y,z);
}

geometry.setAttribute(
"position",
new THREE.Float32BufferAttribute(vertices,3)
);

const material = new THREE.PointsMaterial({
    color:0xbb88ff,
    size:0.12
});

const stars = new THREE.Points(geometry,material);
scene.add(stars);

// ===== CONTROL CON MOUSE (ARRASTRAR) =====
let isDragging = false;
let previousMousePosition = {x:0,y:0};

window.addEventListener("mousedown",(e)=>{
    isDragging = true;
    previousMousePosition = {
        x:e.clientX,
        y:e.clientY
    };
});

window.addEventListener("mouseup",()=>{
    isDragging = false;
});

window.addEventListener("mousemove",(e)=>{

    if(!isDragging) return;

    const deltaMove = {
        x: e.clientX - previousMousePosition.x,
        y: e.clientY - previousMousePosition.y
    };

    stars.rotation.y += deltaMove.x * 0.005;
    stars.rotation.x += deltaMove.y * 0.005;

    previousMousePosition = {
        x:e.clientX,
        y:e.clientY
    };
});

// ===== RESPONSIVE =====
window.addEventListener("resize",()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});

// ===== ANIMACION =====
function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
