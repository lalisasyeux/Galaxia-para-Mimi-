<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia para Mimi</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background: radial-gradient(circle at center, #1a0033 0%, #050010 40%, #000000 100%);
}
</style>

</head>
<body>

<!-- THREE JS (VERSION ESTABLE CDN) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

<script>

// ===== ESCENA =====
const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050010);
scene.fog = new THREE.FogExp2(0x220044, 0.02);
scene.fog = new THREE.FogExp2(0x120022, 0.015);
// ===== CAMARA =====
const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);
camera.position.z = 30;
// ===== ZOOM CON SCROLL =====
window.addEventListener("wheel", (event) => {

  camera.position.z += event.deltaY * 0.02;

  // límites para no atravesar la galaxia
  if(camera.position.z < 5) camera.position.z = 5;
  if(camera.position.z > 80) camera.position.z = 80;

});
// ===== RENDER =====
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== ESTRELLAS SIMPLE (PRUEBA SEGURA) =====
const geometry = new THREE.BufferGeometry();
const vertices = [];

for(let i=0;i<3000;i++){
  vertices.push(
    (Math.random()-0.5)*50,
    (Math.random()-0.5)*50,
    (Math.random()-0.5)*50
  );
}

geometry.setAttribute(
  "position",
  new THREE.Float32BufferAttribute(vertices,3)
);

const material = new THREE.PointsMaterial({
color:0xff88ff,
  size:0.35,
  transparent:true,
  opacity:0.9,
  depthWrite:false,
  blending:THREE.AdditiveBlending
});

const stars = new THREE.Points(geometry, material);
scene.add(stars);
// ===== NUBE ESPACIAL (NEBULOSA) =====
const cloudGeometry = new THREE.SphereGeometry(60, 64, 64);

const cloudMaterial = new THREE.MeshBasicMaterial({
  color:0xaa55ff,
  transparent:true,
  opacity:0.035,
  blending:THREE.AdditiveBlending,
  side:THREE.DoubleSide,
  depthWrite:false
});
const cloud = new THREE.Mesh(cloudGeometry, cloudMaterial);
scene.add(cloud);
cloud.scale.set(1,0.6,1);  
// luz espacial suave
const light = new THREE.PointLight(0xff66ff, 2, 200);
light.position.set(0,0,0);
scene.add(light);
// ===== CONTROL DRAG =====
let dragging=false;
let prevX=0;
let prevY=0;

window.addEventListener("mousedown",(e)=>{
  dragging=true;
  prevX=e.clientX;
  prevY=e.clientY;
});

window.addEventListener("mouseup",()=>{
  dragging=false;
});

window.addEventListener("mousemove",(e)=>{
  if(!dragging) return;

  const dx=e.clientX-prevX;
  const dy=e.clientY-prevY;

  stars.rotation.y+=dx*0.005;
  stars.rotation.x+=dy*0.005;

  prevX=e.clientX;
  prevY=e.clientY;
});

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  cloud.rotation.y += 0.0008;
  cloud.rotation.x += 0.0003;

  cloud.material.opacity =
    0.06 + Math.sin(Date.now()*0.001)*0.02;

  renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
